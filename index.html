<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFleet - ระบบจองรถสำนักงาน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .input-field { @apply w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white; }
        .label-text { @apply block text-xs font-bold text-slate-500 uppercase mb-1 ml-1; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-screen overflow-hidden">

    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-5 shrink-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">SF</div>
            <h1 id="page-title" class="text-lg font-bold text-slate-800">ระบบจองรถ</h1>
        </div>
        <img id="user-picture" class="w-9 h-9 rounded-full border-2 border-blue-100" src="https://ui-avatars.com/api/?name=U" alt="Profile">
    </header>

    <main class="flex-1 overflow-y-auto bg-slate-50 p-4 pb-28">
        
        <div id="page-booking" class="page-section space-y-6">
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-blue-100 text-xs font-medium mb-1">ยินดีต้อนรับคุณ</p>
                    <h2 id="user-display-name" class="text-xl font-bold">กำลังโหลดชื่อ...</h2>
                </div>
                <div class="absolute right-[-20px] bottom-[-20px] opacity-20 text-8xl">🚗</div>
            </div>

            <form id="bookingForm" class="space-y-5">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-blue-600 mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-4 bg-blue-600 rounded-full"></span> 1. ข้อมูลการติดต่อ
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="label-text">ชื่อผู้จอง (จาก LINE)</label>
                            <input type="text" id="form-line-name" readonly class="input-field bg-slate-50 text-slate-500 font-bold">
                        </div>
                        <div>
                            <label class="label-text">เบอร์โทรศัพท์ที่ติดต่อได้ *</label>
                            <input type="tel" id="tel" required placeholder="08X-XXX-XXXX" class="input-field shadow-sm">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-blue-600 mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-4 bg-blue-600 rounded-full"></span> 2. รายละเอียดการเดินทาง
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="label-text">วัตถุประสงค์การใช้รถ *</label>
                            <select id="reason" class="input-field shadow-sm">
                                <option value="ประชุม/ติดต่องาน">ประชุม / ติดต่องาน</option>
                                <option value="รับรองลูกค้า/แขก">รับรองลูกค้า / แขก</option>
                                <option value="ส่งเอกสาร/พัสดุ">ส่งเอกสาร / พัสดุ</option>
                                <option value="อื่นๆ">อื่นๆ (ระบุในหมายเหตุ)</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="label-text">ต้นทาง</label>
                                <input type="text" id="origin" value="สำนักงานใหญ่" class="input-field shadow-sm">
                            </div>
                            <div>
                                <label class="label-text">ปลายทาง *</label>
                                <input type="text" id="destination" required placeholder="ระบุสถานที่" class="input-field shadow-sm">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="label-text">วันที่ไป</label>
                                <input type="date" id="start_date" class="input-field shadow-sm">
                            </div>
                            <div>
                                <label class="label-text">เวลาออก</label>
                                <input type="time" id="start_time" class="input-field shadow-sm">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="label-text">วันที่กลับ</label>
                                <input type="date" id="end_date" class="input-field shadow-sm">
                            </div>
                            <div>
                                <label class="label-text">เวลากลับ</label>
                                <input type="time" id="end_time" class="input-field shadow-sm">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-blue-600 mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-4 bg-blue-600 rounded-full"></span> 3. รายละเอียดรถและผู้โดยสาร
                    </h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="label-text">ประเภทรถ</label>
                                <select id="car_type" class="input-field shadow-sm">
                                    <option value="รถเก๋ง">รถเก๋ง (Sedan)</option>
                                    <option value="รถตู้">รถตู้ (Van)</option>
                                    <option value="รถกระบะ">รถกระบะ (Pickup)</option>
                                    <option value="รถไฟฟ้า">รถไฟฟ้า (EV)</option>
                                </select>
                            </div>
                            <div>
                                <label class="label-text">จำนวนผู้โดยสาร</label>
                                <input type="number" id="passengers" min="1" max="10" value="1" class="input-field shadow-sm">
                            </div>
                        </div>
                        <div>
                            <label class="label-text">หมายเหตุ / คำขอพิเศษ</label>
                            <textarea id="note" rows="2" class="input-field shadow-sm" placeholder="เช่น ขอพนักงานขับรถ, มีของจำนวนมาก ฯลฯ"></textarea>
                        </div>
                    </div>
                </div>

                <button type="button" onclick="submitBooking()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg flex items-center justify-center gap-2">
                    <span>ยืนยันการส่งข้อมูลจองรถ</span>
                </button>
            </form>
        </div>

        <div id="page-dashboard" class="page-section hidden">...สถานะรถคันที่ 1-8...</div>
        <div id="page-history" class="page-section hidden">...ประวัติการจอง...</div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-20 z-50 safe-area-bottom shadow-2xl">
        <button onclick="switchPage('booking')" id="menu-booking" class="flex flex-col items-center gap-1 w-full text-blue-600">
            <span class="text-xl">📝</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">จองรถ</span>
        </button>
        <button onclick="switchPage('dashboard')" id="menu-dashboard" class="flex flex-col items-center gap-1 w-full text-slate-400">
            <span class="text-xl">🚘</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">สถานะรถ</span>
        </button>
        <button onclick="switchPage('history')" id="menu-history" class="flex flex-col items-center gap-1 w-full text-slate-400">
            <span class="text-xl">🕒</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">ประวัติ</span>
        </button>
    </nav>

    <div id="success-modal" class="fixed inset-0 bg-slate-900/70 hidden items-center justify-center z-[100] p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl text-center">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">✓</div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">จองรถเรียบร้อย!</h3>
            <p class="text-slate-500 text-sm mb-6">เราได้ส่งข้อมูลให้แอดมินตรวจสอบแล้ว กรุณารอรับการแจ้งเตือน</p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl shadow-lg">ตกลง</button>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "2009755678-CDFwb7EG"; 

        async function initLIFF() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('user-picture').src = profile.pictureUrl;
                    document.getElementById('user-display-name').innerText = profile.displayName;
                    document.getElementById('form-line-name').value = profile.displayName;
                    
                    // ตั้งค่าวันที่เริ่มต้นเป็นวันนี้
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById('start_date').value = today;
                    document.getElementById('end_date').value = today;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('user-display-name').innerText = "ทดสอบระบบ";
            }
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.replace('text-blue-600', 'text-slate-400'));
            document.getElementById('menu-' + pageId).classList.replace('text-slate-400', 'text-blue-600');
        }

        function submitBooking() {
            // เช็กข้อมูลเบื้องต้น
            const dest = document.getElementById('destination').value;
            const tel = document.getElementById('tel').value;
            if(!dest || !tel) {
                alert("กรุณากรอกข้อมูลปลายทางและเบอร์โทรศัพท์ให้ครบถ้วนค่ะ");
                return;
            }
            // แสดงป๊อปอัปสำเร็จ
            document.getElementById('success-modal').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('success-modal').classList.replace('flex', 'hidden');
            switchPage('history');
        }

        initLIFF();
    </script>
</body>
</html>
