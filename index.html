<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFleet Mobile</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .active-nav { color: #2563eb; border-top: 3px solid #2563eb; }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-screen overflow-hidden">

    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-5 shrink-0 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">SF</div>
            <h1 id="page-title" class="text-lg font-bold text-slate-800">จองรถ</h1>
        </div>
        <div class="flex items-center gap-2">
            <span id="user-name" class="text-xs font-medium text-slate-600">โหลดข้อมูล...</span>
            <img id="user-picture" class="w-8 h-8 rounded-full border border-blue-200 shadow-sm" src="https://ui-avatars.com/api/?name=U" alt="Profile">
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24">
        
        <div id="page-booking" class="page-section space-y-4">
            <div class="bg-blue-600 rounded-2xl p-6 text-white shadow-lg mb-6">
                <h2 class="text-xl font-bold mb-1">สวัสดีค่ะ! 👋</h2>
                <p class="text-blue-100 text-sm">ยินดีต้อนรับสู่ระบบจองรถสำนักงาน</p>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-blue-600 rounded-full"></span> รายละเอียดการจอง
                </h3>
                <form class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อผู้จอง</label>
                        <input type="text" id="form-line-name" readonly class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">เบอร์โทรติดต่อ</label>
                        <input type="tel" placeholder="08X-XXX-XXXX" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">สถานที่ปลายทาง</label>
                        <textarea id="form_dest" rows="2" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="ไปที่ไหนคะ?"></textarea>
                    </div>
                    <button type="button" onclick="showPopup('booking_success')" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-95 transition-transform">
                        ยืนยันการจอง
                    </button>
                </form>
            </div>
        </div>

        <div id="page-dashboard" class="page-section hidden space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-bold">สถานะรถวันนี้</h2>
                <span class="text-xs text-slate-500">ทั้งหมด 8 คัน</span>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <div class="bg-white border border-slate-200 rounded-xl p-4 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-emerald-100 rounded-lg flex items-center justify-center text-emerald-600 font-bold text-xs text-center">EV</div>
                        <div>
                            <h4 class="font-bold text-slate-800">ออ 7777 กทม.</h4>
                            <p class="text-xs text-slate-500">รถไฟฟ้า (EV)</p>
                        </div>
                    </div>
                    <span class="text-emerald-600 text-xs font-bold bg-emerald-50 px-2 py-1 rounded">ว่าง</span>
                </div>
                <div class="bg-white border border-slate-200 rounded-xl p-4 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 font-bold text-xs text-center">VAN</div>
                        <div>
                            <h4 class="font-bold text-slate-800">กค 1234 กทม.</h4>
                            <p class="text-xs text-slate-500">รถตู้ 10 ที่นั่ง</p>
                        </div>
                    </div>
                    <span class="text-blue-600 text-xs font-bold bg-blue-50 px-2 py-1 rounded animate-pulse">ไม่ว่าง</span>
                </div>
                </div>
        </div>

        <div id="page-history" class="page-section hidden space-y-4">
            <h2 class="text-lg font-bold">ประวัติการจอง</h2>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 divide-y">
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <div class="text-sm font-bold">10 เม.ย. 2026</div>
                        <div class="text-xs text-blue-600" id="disp-dest">สยามสแควร์ กรุงเทพฯ</div>
                    </div>
                    <span class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-[10px] font-bold">รอตรวจสอบ</span>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-20 bg-white z-50 safe-area-bottom shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <button onclick="switchPage('booking')" id="menu-booking" class="flex flex-col items-center gap-1 w-full pt-2 active-nav">
            <span class="text-[20px]">🚗</span>
            <span class="text-[10px] font-bold">จองรถ</span>
        </button>
        <button onclick="switchPage('dashboard')" id="menu-dashboard" class="flex flex-col items-center gap-1 w-full pt-2 text-slate-400">
            <span class="text-[20px]">📊</span>
            <span class="text-[10px] font-bold">สถานะรถ</span>
        </button>
        <button onclick="switchPage('history')" id="menu-history" class="flex flex-col items-center gap-1 w-full pt-2 text-slate-400">
            <span class="text-[20px]">🕒</span>
            <span class="text-[10px] font-bold">ประวัติ</span>
        </button>
    </nav>

    <div id="app-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[100] px-6">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in zoom-in-95 duration-200">
            <div id="modal-icon" class="text-4xl text-center mb-4">✅</div>
            <h3 id="modal-title" class="text-lg font-bold text-center mb-2"></h3>
            <p id="modal-body" class="text-slate-500 text-center text-sm mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">ตกลง</button>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "2009755678-CDFwb7EG"; 

        async function initLIFF() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('user-name').innerText = profile.displayName;
                    document.getElementById('user-picture').src = profile.pictureUrl;
                    document.getElementById('form-line-name').value = profile.displayName;
                }
            } catch (err) {
                console.error("LIFF Error: ", err);
                document.getElementById('user-name').innerText = "ผู้ใช้ทดสอบ";
            }
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            
            // อัปเดตสีเมนูด้านล่าง
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active-nav');
                btn.classList.add('text-slate-400');
            });
            document.getElementById('menu-' + pageId).classList.add('active-nav');
            document.getElementById('menu-' + pageId).classList.remove('text-slate-400');

            // เปลี่ยนชื่อหัวข้อ Header
            const titles = { 'booking': 'จองรถสำนักงาน', 'dashboard': 'สถานะรถยนต์', 'history': 'ประวัติของฉัน' };
            document.getElementById('page-title').innerText = titles[pageId];
        }

        function closeModal() { document.getElementById('app-modal').classList.replace('flex', 'hidden'); }

        function showPopup(type) {
            if(type === 'booking_success') {
                document.getElementById('modal-title').innerText = "ส่งคำขอสำเร็จ!";
                document.getElementById('modal-body').innerText = "ระบบได้รับข้อมูลการจองของคุณแล้ว กรุณารอการตรวจสอบ";
                document.getElementById('app-modal').classList.replace('hidden', 'flex');
                switchPage('history');
            }
        }

        initLIFF();
    </script>
</body>
</html>
